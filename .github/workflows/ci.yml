name: CI + Deploy

# PRs deploy a Cloudflare Pages PREVIEW; merges to master deploy PRODUCTION with
# the IDENTICAL build + gate (prod mimics preview). Every deploy is gated behind
# the unit/parity tests and the data-integrity check, so bad content/code can
# never reach prod. Deploys need repo secrets CLOUDFLARE_API_TOKEN +
# CLOUDFLARE_ACCOUNT_ID (Pages:Edit token). Fork PRs skip the deploy (no secrets).
on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default; the preview-URL step needs to write PR comments.
permissions:
  contents: read
  pull-requests: write

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci

      # 1) Pure-logic + DOM unit tests (shared engine, generator, mastery,
      #    char-knowledge, ranker, zhuyin, theme) + the TS side of glyph parity.
      - name: Unit tests
        run: npm run test:unit

      # 2) Python side of the glyph-canonicalization parity (must match the TS
      #    importer's canonicalizeTW against the shared golden fixtures).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Glyph-parity (Python)
        run: |
          pip install --quiet opencc pytest
          pytest test/test_glyph_canon.py -q

      # 3) Type-check (tsc). The build (vite/esbuild) STRIPS types without
      #    checking them, so a real TS error can rot silently on master — this
      #    step is the only thing that runs `tsc`. Covers the platform project
      #    graph (incl. app-consumed modules) via `tsc -b`, plus the shared
      #    workspace's own suite (its __tests__ aren't in platform's graph).
      - name: Type-check
        run: npm run typecheck

      # Lint: report issues without blocking deploy/preview.
      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      # 4) Build the shippable app from the committed content-only seeds
      #    (reproducible; the working DBs aren't in the repo). Platform build
      #    only — the root build's writing-challenge build:data needs raw import
      #    sources that aren't committed and isn't part of deploy.
      - name: Build
        run: npm run build --workspace=platform

      # 5) DEPLOY GATE — verify the baked artifacts before anything ships:
      #    no Simplified/undrawable glyphs, referential integrity, NO personal
      #    data in the snapshots, offline stroke coverage.
      - name: Data-integrity gate
        run: npm run test:data

      # 5a) DEPENDENCY-AUDIT GATE (blocking) — fail the build (and so the deploy)
      #     only on a HIGH/CRITICAL vuln in the SHIPPED prod-runtime deps
      #     (`--omit=dev`). The dev/build toolchain (vite, esbuild, workbox, babel,
      #     etc.) is intentionally OUT of scope: those vulns are dev-box / build-time
      #     only, never reach the static prod bundle, and treating them as a deploy
      #     blocker would wedge the pipeline on routine toolchain advisories. This
      #     gate is the narrow, high-signal one: a real, shippable, high-severity
      #     runtime vuln halts the deploy. (See security audit #51 finding M3.)
      - name: Dependency-audit gate (prod runtime, high+)
        run: npm audit --omit=dev --audit-level=high

      # 5b) FULL AUDIT (informational, non-blocking) — surface the complete picture,
      #     dev/build toolchain included, in the CI log so new vulns are visible
      #     without blocking deploys. `continue-on-error` keeps it advisory.
      - name: Dependency-audit report (full tree, advisory)
        continue-on-error: true
        run: npm audit

      # 6) Deploy. Cloudflare decides preview-vs-prod by comparing --branch to the
      #    project's PRODUCTION BRANCH, which on this direct-upload project is
      #    `learning-chinese` (not `master`). So:
      #      push to master   -> --branch=learning-chinese -> PRODUCTION
      #      pull request      -> --branch=<pr head branch> -> PREVIEW (unique URL)
      #    (To instead use master==prod: set the project's production branch to
      #    `master` in the CF dashboard and change this to github.ref_name.)
      - name: Deploy to Cloudflare Pages
        id: deploy
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: platform
          command: pages deploy dist --project-name=learning-chinese --branch=${{ github.event_name == 'push' && 'learning-chinese' || github.head_ref }}

      # 7) Post (or update) the preview URL on the PR, so each open PR shows its
      #    own link. Sticky via a marker comment → pushes update it in place
      #    instead of stacking new comments.
      - name: Comment preview URL on the PR
        if: ${{ github.event_name == 'pull_request' && steps.deploy.outputs.deployment-url != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const alias = '${{ steps.deploy.outputs.pages-deployment-alias-url }}';
            // PR Link = the branch ALIAS (always-latest for this PR); Commit = the
            // immutable per-commit deployment URL (this exact build). Both groups
            // expose the same routes so a reviewer can pick latest vs pinned.
            const prBase = alias || url;
            const marker = '<!-- cf-preview -->';
            const demoOverride = `${prBase}/?app&demo&nodevicegate`;
            const body = [
              marker,
              '🔎 **Preview deploy** — updates on every push to this PR.',
              '',
              '**PR Link** — always-latest for this branch:',
              `- 🔎 Demo bypass (desktop testing): ${demoOverride}`,
              `- 🎮 Try the demo: ${prBase}/?app&demo  (preset profiles)`,
              `- App (no demo data): ${prBase}/?app`,
              `- UI components (styleguide): ${prBase}/?ui`,
              `- 🔒 Feedback admin (secret-gated): ${prBase}/feedback-admin`,
              `- Marketing: ${prBase}`,
              '',
              '**Commit** — this exact build:',
              `- 🔎 Demo bypass (desktop testing): ${url}/?app&demo&nodevicegate`,
              `- 🎮 Try the demo: ${url}/?app&demo  (preset profiles)`,
              `- App (no demo data): ${url}/?app`,
              `- UI components (styleguide): ${url}/?ui`,
              `- 🔒 Feedback admin (secret-gated): ${url}/feedback-admin`,
              `- Marketing: ${url}`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const prev = comments.find((c) => c.body && c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
