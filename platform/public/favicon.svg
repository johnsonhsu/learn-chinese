223.5 383.5Q240 384 259 386Q243 453 233 491.5Q223 530 215.5 551.5Q208 573 202 582.5Q196 592 189 600Q177 613 173 621Q169 629 175 633.5Q181 638 198 639Q215 640 246 637Z" fill="#1A1A18"/>
    </g>

    <!-- vermilion traditional seal (印章), bottom-right, with reversed 中 -->
    <g transform="translate(366 366)">
      <rect width="112" height="112" rx="20" fill="#B23A2E" mask="url(#sealMark)"/>
      <!-- thin reversed keyline just inside the seal edge -->
      <rect x="8" y="8" width="96" height="96" rx="13" fill="none" stroke="#B23A2E" stroke-width="0"/>
      <rect x="9" y="9" width="94" height="94" rx="12" fill="none" stroke="#F4EFE4" stroke-width="4" opacity="0.9"/>
    </g>

    <!-- whisper-thin ink keyline so the cream tile reads on white pages -->
    <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#1A1A18" stroke-width="3" opacity="0.06"/>
  </g>
</svg>