<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="學 — Learn Chinese">
  <!--
    App icon / favicon — "學" (learn; Traditional, 16-stroke U+5B78) inked in
    brush calligraphy on a warm cream paper tile, with a vermilion traditional
    seal (印章) in the bottom-right corner carrying a reversed 中 (中文).

    The 學 and the seal's 中 are NOT live font glyphs: they are the outlines of
    the STKaitiTC-Black (楷體 / Kai brush) glyphs for U+5B78 / U+4E2D, baked to
    <path>s so the icon renders identically everywhere without depending on a
    CJK font being installed. Kai-Black supplies the confident, inked,
    natural stroke-weight variation the brand wants and stays legible down to a
    brush mark at 16px.

    Palette:
      cream paper  #F4EFE4   (tile)
      brush ink    #1A1A18   (學)
      seal red     #B23A2E   (印章 vermilion)
      brand navy   #073464   (theme_color / background_color — not drawn here)
  -->
  <defs>
    <radialGradient id="paper" cx="38%" cy="30%" r="80%">
      <stop offset="0%"  stop-color="#F8F3E9"/>
      <stop offset="60%" stop-color="#F4EFE4"/>
      <stop offset="100%" stop-color="#ECE4D4"/>
    </radialGradient>
    <clipPath id="tile"><rect width="512" height="512" rx="112"/></clipPath>
    <!-- mask to punch a reversed 中 out of the seal field -->
    <mask id="sealMark">
      <rect width="112" height="112" fill="#fff"/>
      <path d="M843 421Q824 409 806.5 384.5Q789 360 765 311Q785 299 792 286.5Q799 274 794.5 264.5Q790 255 773.5 249.5Q757 244 730 244Q700 245 654 242.5Q608 240 554 235Q553 210 552.5 185Q552 160 550 133Q547 73 544 33Q541 -7 537.5 -35Q534 -63 529 -84Q524 -105 517 -127Q497 -186 482 -183.5Q467 -181 458 -129Q453 -96 450.5 -67Q448 -38 448 3Q448 70 448.5 122Q449 174 450 224Q419 220 388.5 218Q358 216 328 214Q322 172 305 163.5Q288 155 268 175Q260 183 255 190Q250 197 247 206.5Q244 216 242 229.5Q240 243 238 263Q234 307 228 335.5Q222 364 212 391Q195 433 180 447Q145 477 159.5 486.5Q174 496 232 487Q240 485 247 484.5Q254 484 260 482Q281 484 301.5 486.5Q322 489 344 492Q366 495 391.5 498Q417 501 450 506Q450 548 449 576Q448 604 445.5 623Q443 642 438 654Q433 666 426 675Q384 729 396 742Q408 755 485 733Q522 722 543 714.5Q564 707 573 698Q582 689 580 676.5Q578 664 568 645Q561 632 557.5 602.5Q554 573 555 520Q594 525 619 529Q644 533 659.5 536Q675 539 684 542Q693 545 700 548Q716 556 727 559.5Q738 563 748.5 560.5Q759 558 771.5 550Q784 542 804 526Q834 502 849.5 486Q865 470 869 459Q873 448 866 439.5Q859 431 843 421ZM703 456Q707 482 675 479Q657 477 626 474.5Q595 472 556 467Q558 421 557.5 379.5Q557 338 556 296Q601 302 627.5 306Q654 310 671 313Q682 343 689 377Q696 411 703 456ZM451 283Q452 321 452 362.5Q452 404 451 454Q414 449 377.5 444.5Q341 440 309 435Q316 403 321.5 357Q327 311 329 269Q364 273 394.5 276.5Q425 280 451 283Z" transform="translate(56 56) scale(0.0481500512341301 -0.0481500512341301) translate(-512.8535353535353 -281.6161900111607)" fill="#000"/>
    </mask>
  </defs>

  <!-- full-bleed cream rounded-square tile (the tile IS the icon) -->
  <rect width="512" height="512" rx="112" fill="url(#paper)"/>

  <g clip-path="url(#tile)">
    <!-- inked 學 (baked Kai-Black outline), near-black -->
    <g transform="translate(242 240) scale(0.4213794154542364 -0.4213794154542364) translate(-507.0871794871794 -300.64343434343436)">
